<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>武田 鳴 / MEI TAKEDA - Tour Dates & Tickets</title>
<meta name="description" content="Mei Takeda Web site 武田鳴チケット予約">
<meta property="og:image" content="https://takeda-mei.com/img/Twitter_takeda_mei_card.png">
<meta name="twitter:image" content="https://takeda-mei.com/img/Twitter_takeda_mei_card_2.png">
<meta name="twitter:site" content="@_takeda_mei_">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="武田鳴チケット予約">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;600&display=swap');

  :root {
    --bg: #08080a;
    --surface: #131316;
    --surface-hover: #1a1a1e;
    --border: #28282e;
    --border-bright: #3a3a42;
    --border-active: #50505a;
    --text: #e8e6e2;
    --text-secondary: #a8a4a0;
    --text-dim: #6a6660;
    --text-label: #807c78;
    --highlight: #ffffff;
    --select-bg: #141e14;
    --select-border: #2a4a2a;
    --select-text: #8abd8a;
    --error: #cc4444;
    --success: #44aa66;
    --mono: 'IBM Plex Mono', 'Courier New', monospace;
    --sans: 'Noto Sans JP', 'IBM Plex Mono', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.7;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 660px; margin: 0 auto; padding: 48px 24px 80px; }

  .header { border-bottom: 1px solid var(--border); padding-bottom: 28px; margin-bottom: 44px; }
  .header-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .header-title { font-size: 11px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-secondary); }
  .header-label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.12em; }
  .header-name { font-size: 26px; font-weight: 400; letter-spacing: 0.06em; color: var(--highlight); margin-bottom: 4px; font-family: var(--sans); }
  .header-sub { font-size: 12px; color: var(--text-dim); letter-spacing: 0.06em; }

  .section-label {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-label); margin-bottom: 20px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  /* LOADING */
  .loading { text-align: center; padding: 56px 20px; color: var(--text-dim); font-size: 12px; letter-spacing: 0.12em; }
  .loading-dot { display: inline-block; animation: blink 1.2s infinite; }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity:.2; } 40% { opacity:1; } }

  /* EVENT CARDS */
  .event-list { margin-bottom: 48px; }
  .event-card {
    border: 1px solid var(--border); padding: 24px; margin-bottom: 14px;
    cursor: pointer; transition: all .15s ease; position: relative; background: var(--surface);
  }
  .event-card:hover { background: var(--surface-hover); border-color: var(--border-bright); }
  .event-card.selected { background: var(--select-bg); border-color: var(--select-border); }
  .event-card.selected .event-date { color: var(--select-text); }
  .event-card.past { opacity:.3; pointer-events:none; }
  .event-card.past::after { content:'ENDED'; position:absolute; right:24px; top:24px; font-size:10px; letter-spacing:.15em; color:var(--text-dim); }

  .event-date-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px; }
  .event-date { font-size:18px; font-weight:500; color:var(--highlight); letter-spacing:.04em; }
  .event-day { font-size:12px; color:var(--text-secondary); }
  .event-title-text { font-size:14px; font-weight:500; color:var(--text); margin-bottom:6px; font-family:var(--sans); }
  .event-venue { font-size:15px; color:var(--text); margin-bottom:16px; font-family:var(--sans); }

  .event-meta {
    display:grid; grid-template-columns:1fr 1fr 1.5fr; gap:4px;
    font-size:13px; margin-bottom:16px; padding:14px 16px;
    background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.05);
  }
  .meta-item { display:flex; flex-direction:column; gap:4px; }
  .meta-label { font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--text-dim); }
  .meta-value { color:var(--text-secondary); font-size:13px; }

  .event-acts { font-size:12px; color:var(--text-dim); font-family:var(--sans); line-height:1.8; }
  .event-acts strong { color:var(--text-secondary); font-weight:400; }

  /* NO EVENTS / REQUEST */
  .no-events-message { text-align:center; padding:40px 20px 32px; color:var(--text-dim); font-size:13px; line-height:2.2; }
  .request-box { border:1px solid var(--border); background:var(--surface); padding:28px; margin-top:8px; }
  .request-title { font-size:12px; letter-spacing:.15em; text-transform:uppercase; color:var(--text-secondary); margin-bottom:6px; }
  .request-desc { font-size:13px; color:var(--text-dim); margin-bottom:24px; line-height:1.7; font-family:var(--sans); }

  /* FORM */
  .form-section { display:none; }
  .form-section.active { display:block; }

  .selected-event-summary { background:var(--surface); border:1px solid var(--border); padding:20px 24px; margin-bottom:28px; font-size:13px; }
  .summary-line { display:flex; justify-content:space-between; color:var(--text); margin-bottom:6px; }
  .summary-line:last-child { margin-bottom:0; }
  .summary-label { color:var(--text-dim); font-size:10px; letter-spacing:.12em; text-transform:uppercase; min-width:100px; }
  .summary-value { text-align:right; color:var(--text-secondary); }

  .form-group { margin-bottom:24px; }
  .form-label { display:block; font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-secondary); margin-bottom:10px; font-weight:500; }
  .form-label .req { color:var(--text-dim); font-weight:400; }

  input,select,textarea {
    width:100%; background:var(--bg); border:1px solid var(--border);
    color:var(--text); font-family:var(--mono); font-size:14px; padding:14px 16px;
    outline:none; transition:border-color .2s ease; -webkit-appearance:none; border-radius:0;
  }
  input:focus,select:focus,textarea:focus { border-color:var(--border-active); background:var(--surface); }
  input::placeholder,textarea::placeholder { color:var(--text-dim); }
  select { cursor:pointer; color:var(--text-secondary); }
  textarea { resize:vertical; min-height:90px; }
  input[readonly] { color:var(--text-dim); cursor:default; }

  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

  .btn {
    display:inline-block; font-family:var(--mono); font-size:12px;
    letter-spacing:.14em; text-transform:uppercase; padding:16px 32px;
    border:1px solid var(--border-bright); background:transparent;
    color:var(--text); cursor:pointer; transition:all .15s ease; text-decoration:none;
  }
  .btn:hover { background:var(--highlight); color:var(--bg); border-color:var(--highlight); }
  .btn-row { display:flex; gap:12px; margin-top:36px; }
  .btn-back { color:var(--text-dim); border-color:var(--border); }
  .btn-back:hover { background:var(--surface-hover); color:var(--text); border-color:var(--border-bright); }

  .status-msg { margin-top:20px; padding:14px; text-align:center; font-size:13px; border:1px solid var(--border); display:none; }
  .status-msg.success { background:rgba(68,170,102,.1); border-color:var(--success); color:var(--success); display:block; }
  .status-msg.error { background:rgba(204,68,68,.1); border-color:var(--error); color:var(--error); display:block; }

  .footer { margin-top:60px; padding-top:24px; border-top:1px solid var(--border); font-size:11px; color:var(--text-dim); text-align:center; }
  .footer a { color:var(--text-dim); text-decoration:none; }
  .footer a:hover { color:var(--text-secondary); }

  @media (max-width:480px) {
    .container { padding:28px 16px 60px; }
    .event-card { padding:20px; }
    .event-meta { grid-template-columns:1fr 1fr; gap:12px; }
    .event-date { font-size:16px; }
    .btn-row { flex-direction:column; }
    .btn { text-align:center; }
    .summary-line { flex-direction:column; gap:2px; }
    .summary-value { text-align:left; }
    .form-row { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-top">
      <span class="header-title">Ticket Reservation</span>
      <span class="header-label">1+1.=V.</span>
    </div>
    <div class="header-name">武田 鳴</div>
    <div class="header-sub">MEI TAKEDA — Live Schedule & Reservation</div>
  </div>

  <!-- EVENT LIST -->
  <div id="event-section" class="event-list">
    <div class="section-label">Upcoming Events</div>
    <div id="event-container">
      <div class="loading">FETCHING EVENTS<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span></div>
    </div>
  </div>

  <!-- TICKET RESERVATION FORM (Google Form) -->
  <div id="form-section" class="form-section">
    <div class="section-label">Reservation Form</div>
    <div id="selected-summary" class="selected-event-summary"></div>

    <form id="reservationForm"
          action="https://docs.google.com/forms/d/e/1FAIpQLSf7TGrqnpnEOnR_AzyaVAJlAGWun2ZbL9YxXlwWiibZAEuG1Q/formResponse"
          method="POST">

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">名前 <span class="req">*</span></label>
          <input type="text" id="f-name" name="entry.817030556" required placeholder="お名前">
        </div>
        <div class="form-group">
          <label class="form-label">Email <span class="req">*</span></label>
          <input type="email" id="f-email" name="entry.594301832" required placeholder="your@email.com">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">チケット枚数 <span class="req">*</span></label>
          <select id="f-tickets" name="entry.845925255" required>
            <option value="" disabled selected>選択してください</option>
            <option value="１枚">1枚</option>
            <option value="２枚">2枚</option>
            <option value="３枚">3枚</option>
            <option value="４枚">4枚</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">イベント</label>
          <input type="text" id="f-event-title" name="entry.885220633" readonly>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">メッセージ <span class="req">(任意)</span></label>
        <textarea id="f-message" name="entry.1558980968" placeholder="ご質問やご要望があれば"></textarea>
      </div>

      <div class="form-group" style="max-width:200px;">
        <label class="form-label">Bot確認: 3 + 4 = ?</label>
        <input type="text" id="f-verify" required placeholder="答えを入力">
      </div>

      <!-- 隠しフィールド -->
      <input type="hidden" name="entry.35324790" id="f-event-date">
      <input type="hidden" name="entry.1354862515" id="f-event-venue">

      <div class="btn-row">
        <button type="button" class="btn btn-back" onclick="showEvents()">← Back</button>
        <button type="submit" class="btn">予約を送信</button>
        <button type="button" class="btn btn-back" id="mailBtn">メールで送信</button>
      </div>

      <div id="formStatus" class="status-msg"></div>
    </form>
  </div>

  <!-- LIVE REQUEST (no events) -->
  <div id="request-section" class="form-section">
    <div class="no-events-message">
      現在予定されているライブはありません<br>
      NO UPCOMING EVENTS
    </div>
    <div class="request-box">
      <div class="request-title">Live Request</div>
      <div class="request-desc">あなたの街でライブしてほしい、こんなイベントに出てほしい等の<br>リクエストがあればお聞かせください。</div>
      <form id="request-form">
        <div class="form-group">
          <label class="form-label">名前 <span class="req">*</span></label>
          <input type="text" id="r-name" placeholder="お名前" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email <span class="req">*</span></label>
          <input type="email" id="r-email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">リクエスト内容 <span class="req">*</span></label>
          <textarea id="r-message" placeholder="例：大阪でライブしてほしい / ○○のイベントに出てほしい" required></textarea>
        </div>
        <div class="btn-row">
          <button type="submit" class="btn">リクエストを送信</button>
        </div>
      </form>
    </div>
  </div>

  <div class="footer">
    <a href="https://takeda-mei.com">← takeda-mei.com</a>
  </div>
</div>

<script>
// ============================================================
//  設定
// ============================================================
const BIT_ARTIST = '武田 鳴';
const BIT_APP_ID = '610e81a3e048378adaaea829de59f64b';
const MAILTO = 'maitakedev@gmail.com';

// description フォーマット:
//   OPEN:18:00 | START:18:30 | ADV:2500 | DOOR:3000 | NOTE:+1D
//   または PRICE:前売 ¥2,500 / 当日 ¥3,000（+1D）

const OVERRIDES = {};
const MANUAL_EVENTS = [];

// ============================================================
const DAYS_JP = ['日','月','火','水','木','金','土'];
let allEvents = [];
let selectedEvent = null;

// ── description パース ──
function parseDescription(desc) {
  if (!desc) return {};
  const result = {};
  const parts = desc.split('|').map(s => s.trim());
  let adv = '', door = '', note = '';

  for (const part of parts) {
    let m;
    if ((m = part.match(/^OPEN\s*[:：]\s*(.+)/i))) result.open = m[1].trim();
    else if ((m = part.match(/^START\s*[:：]\s*(.+)/i))) result.start = m[1].trim();
    else if ((m = part.match(/^PRICE\s*[:：]\s*(.+)/i))) result.price = m[1].trim();
    else if ((m = part.match(/^ADV\s*[:：]\s*(.+)/i))) adv = m[1].trim();
    else if ((m = part.match(/^DOOR\s*[:：]\s*(.+)/i))) door = m[1].trim();
    else if ((m = part.match(/^NOTE\s*[:：]\s*(.+)/i))) note = m[1].trim();
  }

  // ADV/DOOR → price文字列
  if (!result.price && (adv || door)) {
    const p = [];
    if (adv) p.push(`前売 ¥${Number(adv).toLocaleString()}`);
    if (door) p.push(`当日 ¥${Number(door).toLocaleString()}`);
    result.price = p.join(' / ');
    if (note) result.price += `（${note}）`;
  }

  // フォールバック: ¥数字 を拾う（元のコードと同じロジック）
  if (!result.price && desc) {
    const priceMatch = desc.match(/¥(\d{1,6})/g);
    if (priceMatch && priceMatch.length >= 2) {
      const a = parseInt(priceMatch[0].replace('¥',''));
      const d = parseInt(priceMatch[1].replace('¥',''));
      result.price = `前売 ¥${a.toLocaleString()} / 当日 ¥${d.toLocaleString()}`;
    } else if (priceMatch && priceMatch.length === 1) {
      const a = parseInt(priceMatch[0].replace('¥',''));
      result.price = `¥${a.toLocaleString()}`;
    }
  }

  return result;
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return { full: dateStr, dow: '' };
  return {
    full: `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`,
    dow: DAYS_JP[d.getDay()]
  };
}

function isPast(dateStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  return new Date(dateStr + 'T00:00:00') < today;
}

// ── Bandsintown API ──
async function fetchBITEvents() {
  try {
    const url = `https://rest.bandsintown.com/artists/${encodeURIComponent(BIT_ARTIST)}/events?app_id=${BIT_APP_ID}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!Array.isArray(data)) return [];

    return data.map(ev => {
      const parsed = parseDescription(ev.description || '');
      const override = OVERRIDES[String(ev.id)] || {};
      const dt = new Date(ev.datetime);
      const dateOnly = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
      const startTime = `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;

      // open = descriptionから、なければ開演30分前
      let openTime = parsed.open || '';
      if (!openTime && startTime !== '00:00') {
        const openDt = new Date(dt.getTime() - 30 * 60 * 1000);
        openTime = `${String(openDt.getHours()).padStart(2,'0')}:${String(openDt.getMinutes()).padStart(2,'0')}`;
      }

      let venueName = ev.venue?.name || '';
      const city = ev.venue?.city || '';
      if (city) venueName += `（${city}）`;

      return {
        id: String(ev.id),
        date: dateOnly,
        title: ev.title || '',
        venue: override.venue || venueName,
        city: city,
        open: override.open || openTime,
        start: override.start || parsed.start || startTime,
        price: override.price || parsed.price || '',
        acts: override.acts || (ev.lineup?.length > 0 ? ev.lineup : ['武田鳴']),
      };
    });
  } catch (err) {
    console.error('Bandsintown fetch error:', err);
    return null;
  }
}

// ── レンダリング ──
function renderEvents() {
  const container = document.getElementById('event-container');
  const upcoming = allEvents.filter(e => !isPast(e.date));
  const past = allEvents.filter(e => isPast(e.date));
  const sorted = [...upcoming, ...past];

  if (upcoming.length === 0) {
    document.getElementById('event-section').style.display = 'none';
    document.getElementById('request-section').classList.add('active');
    return;
  }

  container.innerHTML = sorted.map((ev, i) => {
    const { full, dow } = formatDate(ev.date);
    const ended = isPast(ev.date);

    let metaHTML = '';
    if (ev.open || ev.start || ev.price) {
      metaHTML = '<div class="event-meta">';
      if (ev.open) metaHTML += `<div class="meta-item"><span class="meta-label">Open</span><span class="meta-value">${ev.open}</span></div>`;
      if (ev.start) metaHTML += `<div class="meta-item"><span class="meta-label">Start</span><span class="meta-value">${ev.start}</span></div>`;
      if (ev.price) metaHTML += `<div class="meta-item"><span class="meta-label">Price</span><span class="meta-value">${ev.price}</span></div>`;
      metaHTML += '</div>';
    }

    const titleHTML = ev.title ? `<div class="event-title-text">${ev.title}</div>` : '';

    return `
      <div class="event-card ${ended ? 'past' : ''}" data-index="${i}" onclick="${ended ? '' : `selectEvent(${i})`}">
        <div class="event-date-row">
          <span class="event-date">${full}</span>
          <span class="event-day">${dow}</span>
        </div>
        ${titleHTML}
        <div class="event-venue">${ev.venue}</div>
        ${metaHTML}
        <div class="event-acts"><strong>出演:</strong> ${ev.acts.join(' / ')}</div>
      </div>`;
  }).join('');
}

function selectEvent(index) {
  const upcoming = allEvents.filter(e => !isPast(e.date));
  const past = allEvents.filter(e => isPast(e.date));
  selectedEvent = [...upcoming, ...past][index];
  if (!selectedEvent || isPast(selectedEvent.date)) return;

  document.querySelectorAll('.event-card').forEach((el, i) => el.classList.toggle('selected', i === index));

  // サマリー表示
  const { full, dow } = formatDate(selectedEvent.date);
  let html = `<div class="summary-line"><span class="summary-label">Date</span><span class="summary-value">${full}（${dow}）</span></div>`;
  html += `<div class="summary-line"><span class="summary-label">Venue</span><span class="summary-value">${selectedEvent.venue}</span></div>`;
  if (selectedEvent.open || selectedEvent.start) {
    html += `<div class="summary-line"><span class="summary-label">Open / Start</span><span class="summary-value">${[selectedEvent.open, selectedEvent.start].filter(Boolean).join(' / ')}</span></div>`;
  }
  if (selectedEvent.price) {
    html += `<div class="summary-line"><span class="summary-label">Price</span><span class="summary-value">${selectedEvent.price}</span></div>`;
  }
  document.getElementById('selected-summary').innerHTML = html;

  // 隠しフィールドにイベント情報をセット
  document.getElementById('f-event-title').value = selectedEvent.title || `${full} ${selectedEvent.venue}`;
  document.getElementById('f-event-date').value = selectedEvent.date;
  document.getElementById('f-event-venue').value = selectedEvent.venue;

  document.getElementById('event-section').style.display = 'none';
  document.getElementById('form-section').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showEvents() {
  document.getElementById('event-section').style.display = '';
  document.getElementById('form-section').classList.remove('active');
  selectedEvent = null;
  document.querySelectorAll('.event-card').forEach(el => el.classList.remove('selected'));
}

function showStatus(msg, type) {
  const el = document.getElementById('formStatus');
  el.textContent = msg;
  el.className = `status-msg ${type}`;
  setTimeout(() => { el.style.display = 'none'; el.className = 'status-msg'; }, 5000);
}

// ── Google Form 送信 ──
document.getElementById('reservationForm').addEventListener('submit', function(e) {
  e.preventDefault();

  // バリデーション
  const verify = document.getElementById('f-verify').value.trim();
  if (verify !== '7') {
    showStatus('確認問題の答えが正しくありません (3 + 4 = 7)', 'error');
    document.getElementById('f-verify').focus();
    return;
  }

  if (!selectedEvent) {
    showStatus('イベントを選択してください', 'error');
    return;
  }

  showStatus('送信中...', 'success');

  const form = e.target;
  const formData = new FormData(form);

  // Google Form に POST（no-cors）
  fetch(form.action, {
    method: 'POST',
    body: formData,
    mode: 'no-cors'
  }).then(() => {
    console.log('Google Form 送信完了');
  }).catch((err) => {
    console.log('送信処理:', err);
  });

  // 成功ページへ遷移
  setTimeout(() => {
    if (selectedEvent) {
      const params = new URLSearchParams({
        event: selectedEvent.title || '',
        date: selectedEvent.date,
        venue: selectedEvent.venue,
        city: selectedEvent.city || ''
      });
      window.location.href = `thanks-form.html?${params.toString()}`;
    } else {
      window.location.href = 'thanks-form.html';
    }
  }, 1500);
});

// ── メール送信 ──
document.getElementById('mailBtn').addEventListener('click', function() {
  if (!selectedEvent) { showStatus('イベントを選択してください', 'error'); return; }

  const verify = document.getElementById('f-verify').value.trim();
  if (verify !== '7') { showStatus('確認問題の答えが正しくありません', 'error'); return; }

  const name = document.getElementById('f-name').value;
  const email = document.getElementById('f-email').value;
  const tickets = document.getElementById('f-tickets').value;
  const message = document.getElementById('f-message').value;
  const { full } = formatDate(selectedEvent.date);

  const subject = encodeURIComponent(`【チケット予約】${selectedEvent.title || full + ' ' + selectedEvent.venue}`);
  const body = encodeURIComponent(
    `チケット予約\n────────────────\n` +
    `日程: ${full}\n会場: ${selectedEvent.venue}\n` +
    (selectedEvent.open ? `開場: ${selectedEvent.open}\n` : '') +
    (selectedEvent.start ? `開演: ${selectedEvent.start}\n` : '') +
    (selectedEvent.price ? `料金: ${selectedEvent.price}\n` : '') +
    `────────────────\n` +
    `名前: ${name}\nEmail: ${email}\n枚数: ${tickets}\n` +
    (message ? `メッセージ: ${message}\n` : '') +
    `────────────────\n`
  );
  window.location.href = `mailto:${MAILTO}?subject=${subject}&body=${body}`;
});

// ── ライブリクエスト送信 ──
document.getElementById('request-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const name = document.getElementById('r-name').value;
  const email = document.getElementById('r-email').value;
  const message = document.getElementById('r-message').value;
  const subject = encodeURIComponent(`【ライブリクエスト】${name}`);
  const body = encodeURIComponent(`ライブリクエスト\n────────────────\n名前: ${name}\nEmail: ${email}\n\n${message}\n────────────────\n`);
  window.location.href = `mailto:${MAILTO}?subject=${subject}&body=${body}`;
});

// ── 初期化 ──
async function init() {
  const bitEvents = await fetchBITEvents();
  allEvents = bitEvents === null ? [...MANUAL_EVENTS] : [...bitEvents, ...MANUAL_EVENTS];
  allEvents.sort((a, b) => new Date(a.date) - new Date(b.date));
  renderEvents();
}

init();
</script>
